<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robótica Sustentável — Painel de Monitoramento</title>

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <!-- Estilos globais e por módulo -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
</head>

<body>

  <div class="app">

    <!-- Barra lateral de navegação -->
    <div class="sidebar-wrap">
      <aside class="sidebar">

        <div class="s-header">
          <div class="s-logo-row">
            <div class="s-logo-icon">
              <i class="ti ti-recycle" aria-hidden="true"></i>
            </div>
            <div class="s-brand-text">
              <div class="brand">Robótica <em>Sustentável</em></div>
              <div class="sub">Reciclagem Eletrônica</div>
            </div>
          </div>
          <div class="s-status">
            <div class="s-status-dot"></div>
            Sistema ativo
          </div>
        </div>

        <nav class="s-nav">
          <div class="s-section-label">Principal</div>

          <button class="nav-item active" onclick="App.showView('coleta')" id="nav-coleta">
            <div class="nav-icon">
              <i class="ti ti-clipboard-plus" aria-hidden="true"></i>
            </div>
            <span class="nav-label">Solicitar coleta</span>
          </button>

          <div class="s-section-label">Gestão</div>

          <button class="nav-item" onclick="App.showView('painel')" id="nav-painel">
            <div class="nav-icon">
              <i class="ti ti-layout-list" aria-hidden="true"></i>
            </div>
            <span class="nav-label">Painel de controle</span>
            <span class="nav-badge">7</span>
          </button>

          <button class="nav-item" onclick="App.showView('rotas')" id="nav-rotas">
            <div class="nav-icon">
              <i class="ti ti-route" aria-hidden="true"></i>
            </div>
            <span class="nav-label">Rotas de coleta</span>
          </button>

          <button class="nav-item" onclick="App.showView('declaracao')" id="nav-declaracao">
            <div class="nav-icon">
              <i class="ti ti-file-certificate" aria-hidden="true"></i>
            </div>
            <span class="nav-label">Declaração</span>
          </button>
        </nav>

        <div class="s-footer">
          <div class="s-user">
            <div class="s-avatar">MA</div>
            <div class="s-user-info">
              <div class="s-user-name">Marcos Andrade</div>
              <div class="s-user-role">Operador</div>
            </div>
            <i class="ti ti-chevron-up-down s-user-icon" aria-hidden="true"></i>
          </div>
        </div>

      </aside>
    </div>

    <!-- Área de conteúdo principal -->
    <main class="main" id="main-content">

      <!-- Cada view é carregada via JS ou pode ser incluída diretamente -->
      <div id="view-coleta" class="view active"></div>
      <div id="view-painel" class="view"></div>
      <div id="view-rotas" class="view"></div>
      <div id="view-declaracao" class="view"></div>

    </main>
  </div>

  <!-- 1. Adicione os scripts do Firebase (versão Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- 2. Adicione o seu arquivo de configuração (criaremos a seguir) -->
  <script src="js/firebase-setup.js"></script>

  <!-- Módulo de navegação principal -->
  <script src="js/app.js"></script>

  <!-- Módulos de cada view -->
  <script src="js/views/coleta.js"></script>
  <script src="js/views/painel.js"></script>
  <script src="js/views/rotas.js"></script>
  <script src="js/views/declaracao.js"></script>

  <!-- Inicializa a aplicação -->
  <script>
    App.init();
  </script>

</body>

</html>
